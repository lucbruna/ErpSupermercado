{% extends "base.html" %}
{% block content %}
<h4 class="mb-3"><i class="bi bi-cloud-arrow-up"></i> Backup do Banco</h4>
<div class="card card-dash p-3 mb-3">
    <div class="d-flex gap-2">
        <a href="{{ url_for('backup.executar') }}" class="btn btn-primary"><i class="bi bi-play"></i> Executar Backup Agora</a>
        <a href="{{ url_for('backup.agendar') }}" class="btn btn-outline-secondary"><i class="bi bi-clock"></i> Agendar Backup Diário (03:00)</a>
    </div>
</div>
<div class="card card-dash p-3">
    <h6>Backups Realizados</h6>
    <div class="table-responsive">
        <table class="table table-sm table-hover">
            <thead>
                <tr><th>Arquivo</th><th>Data</th><th>Tamanho</th><th>Ações</th></tr>
            </thead>
            <tbody>
                {% for b in backups %}
                <tr>
                    <td>{{ b.nome }}</td>
                    <td>{{ b.data }}</td>
                    <td>{{ b.tamanho }}</td>
                    <td>
                        <a href="{{ url_for('backup.baixar', nome=b.nome) }}" class="btn btn-sm btn-success"><i class="bi bi-download"></i></a>
                        <a href="{{ url_for('backup.excluir', nome=b.nome) }}" class="btn btn-sm btn-danger" onclick="return confirm('Excluir este backup?')"><i class="bi bi-trash"></i></a>
                    </td>
                </tr>
                {% else %}
                <tr><td colspan="4" class="text-center py-4 text-muted">Nenhum backup encontrado.</td></tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
