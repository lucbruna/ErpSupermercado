{% extends "base.html" %}
{% block title %}ECF{% endblock %}
{% block content %}
<h2><i class="bi bi-file-earmark-text"></i> ECF - Escrituração Contábil Fiscal</h2>
<hr>
<p>Gere o arquivo SPED da Escrituração Contábil Fiscal (ECF) para envio à RFB.</p>
<form method="POST" class="row g-3">
    <div class="col-md-4">
        <label class="form-label">Data Início</label>
        <input type="date" name="data_inicio" class="form-control" value="{{ ano_inicio }}" required>
    </div>
    <div class="col-md-4">
        <label class="form-label">Data Fim</label>
        <input type="date" name="data_fim" class="form-control" value="{{ ano_fim }}" required>
    </div>
    <div class="col-md-4 align-self-end">
        <button type="submit" class="btn btn-warning"><i class="bi bi-download"></i> Gerar ECF</button>
    </div>
</form>
{% endblock %}
