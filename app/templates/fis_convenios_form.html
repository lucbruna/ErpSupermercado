{% extends "base.html" %}
{% block content %}
<h4 class="mb-3"><i class="bi bi-building"></i> Novo Convenio</h4>
<div class="card card-dash"><div class="card-body">
<form method="POST">
    <div class="row">
        <div class="col-md-6 mb-3"><label class="form-label">Nome *</label><input type="text" name="nome" class="form-control" required></div>
        <div class="col-md-3 mb-3"><label class="form-label">CNPJ</label><input type="text" name="cnpj" class="form-control"></div>
        <div class="col-md-3 mb-3"><label class="form-label">Contato</label><input type="text" name="contato" class="form-control"></div>
    </div>
    <div class="row">
        <div class="col-md-4 mb-3"><label class="form-label">Telefone</label><input type="text" name="telefone" class="form-control"></div>
        <div class="col-md-4 mb-3"><label class="form-label">Email</label><input type="email" name="email" class="form-control"></div>
        <div class="col-md-2 mb-3"><label class="form-label">Limite Credito</label><input type="number" name="limite_credito" class="form-control" step="0.01" value="0"></div>
        <div class="col-md-2 mb-3"><label class="form-label">Prazo (dias)</label><input type="number" name="prazo_recebimento" class="form-control" value="30"></div>
    </div>
    <button type="submit" class="btn btn-primary">Salvar</button>
    <a href="{{ url_for('fiscal.lista_convenios') }}" class="btn btn-secondary">Cancelar</a>
</form>
</div></div>
{% endblock %}
