{% extends "base.html" %}
{% block content %}
<h4 class="mb-3"><i class="bi bi-bullseye"></i> Nova Meta</h4>
<div class="card card-dash p-4">
    <form method="POST">
        <div class="row">
            <div class="col-md-6 mb-3">
                <label class="form-label">Vendedor *</label>
                <select name="usuario_id" class="form-select" required>
                    <option value="">Selecione</option>
                    {% for u in vendedores %}
                    <option value="{{ u.id }}">{{ u.nome }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-md-3 mb-3">
                <label class="form-label">Mês *</label>
                <select name="mes" class="form-select" required>
                    {% for i in range(1, 13) %}
                    <option value="{{ i }}">{{ i }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-md-3 mb-3">
                <label class="form-label">Ano *</label>
                <input type="number" name="ano" class="form-control" value="{{ now().year }}" required>
            </div>
        </div>
        <div class="row">
            <div class="col-md-4 mb-3">
                <label class="form-label">Valor Meta (R$) *</label>
                <input type="number" name="valor_meta" class="form-control" step="0.01" required>
            </div>
            <div class="col-md-4 mb-3">
                <label class="form-label">Comissão Percentual (%)</label>
                <input type="number" name="comissao_percentual" class="form-control" step="0.01" value="0">
            </div>
            <div class="col-md-4 mb-3">
                <label class="form-label">Comissão Fixa (R$)</label>
                <input type="number" name="comissao_fixa" class="form-control" step="0.01" value="0">
            </div>
        </div>
        <button type="submit" class="btn btn-primary"><i class="bi bi-save"></i> Salvar</button>
        <a href="{{ url_for('crm.metas') }}" class="btn btn-secondary">Cancelar</a>
    </form>
</div>
{% endblock %}
