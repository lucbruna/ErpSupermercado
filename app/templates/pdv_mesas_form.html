{% extends "base.html" %}
{% block content %}
<h4 class="mb-3"><i class="bi bi-plus-circle"></i> {% if mesa %}Editar{% else %}Nova{% endif %} Mesa</h4>
<div class="card card-dash p-4">
    <form method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="row">
            <div class="col-md-4 mb-3">
                <label class="form-label">Número *</label>
                <input type="number" name="numero" class="form-control" value="{{ mesa.numero if mesa else '' }}" required>
            </div>
            <div class="col-md-4 mb-3">
                <label class="form-label">Descrição</label>
                <input type="text" name="descricao" class="form-control" value="{{ mesa.descricao if mesa else '' }}" placeholder="Ex: Mesa do canto">
            </div>
            <div class="col-md-4 mb-3">
                <label class="form-label">Capacidade *</label>
                <input type="number" name="capacidade" class="form-control" value="{{ mesa.capacidade if mesa else 4 }}" required>
            </div>
        </div>
        <button type="submit" class="btn btn-primary"><i class="bi bi-save"></i> Salvar</button>
        <a href="{{ url_for('mesas.lista') }}" class="btn btn-secondary">Cancelar</a>
    </form>
</div>
{% endblock %}
