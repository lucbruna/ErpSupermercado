{% extends "base.html" %}
{% block content %}
<h4 class="mb-3"><i class="bi bi-truck"></i> {{ 'Editar' if fornecedor else 'Novo' }} Fornecedor</h4>
<div class="card card-dash"><div class="card-body">
<form method="POST">
    <div class="row">
        <div class="col-md-6 mb-3"><label class="form-label">Nome *</label><input type="text" name="nome" class="form-control" value="{{ fornecedor.nome if fornecedor else '' }}" required></div>
        <div class="col-md-3 mb-3"><label class="form-label">CPF/CNPJ</label><input type="text" name="cpf_cnpj" class="form-control" value="{{ fornecedor.cpf_cnpj if fornecedor else '' }}"></div>
        <div class="col-md-3 mb-3"><label class="form-label">RG/IE</label><input type="text" name="rg_ie" class="form-control" value="{{ fornecedor.rg_ie if fornecedor else '' }}"></div>
    </div>
    <div class="row">
        <div class="col-md-4 mb-3"><label class="form-label">Email</label><input type="email" name="email" class="form-control" value="{{ fornecedor.email if fornecedor else '' }}"></div>
        <div class="col-md-4 mb-3"><label class="form-label">Telefone</label><input type="text" name="telefone" class="form-control" value="{{ fornecedor.telefone if fornecedor else '' }}"></div>
        <div class="col-md-2 mb-3"><label class="form-label">Prazo (dias)</label><input type="number" name="prazo_entrega" class="form-control" value="{{ fornecedor.prazo_entrega if fornecedor else '30' }}"></div>
    </div>
    <div class="row">
        <div class="col-md-2 mb-3"><label class="form-label">CEP</label><input type="text" name="cep" class="form-control" value="{{ fornecedor.cep if fornecedor else '' }}"></div>
        <div class="col-md-5 mb-3"><label class="form-label">Endereço</label><input type="text" name="endereco" class="form-control" value="{{ fornecedor.endereco if fornecedor else '' }}"></div>
        <div class="col-md-1 mb-3"><label class="form-label">Nº</label><input type="text" name="numero" class="form-control" value="{{ fornecedor.numero if fornecedor else '' }}"></div>
        <div class="col-md-4 mb-3"><label class="form-label">Bairro</label><input type="text" name="bairro" class="form-control" value="{{ fornecedor.bairro if fornecedor else '' }}"></div>
    </div>
    <div class="row">
        <div class="col-md-4 mb-3"><label class="form-label">Cidade</label><input type="text" name="cidade" class="form-control" value="{{ fornecedor.cidade if fornecedor else '' }}"></div>
        <div class="col-md-2 mb-3"><label class="form-label">UF</label><input type="text" name="uf" class="form-control" maxlength="2" value="{{ fornecedor.uf if fornecedor else '' }}"></div>
    </div>
    <button type="submit" class="btn btn-warning">Salvar</button>
    <a href="{{ url_for('cadastros.lista_fornecedores') }}" class="btn btn-secondary">Cancelar</a>
</form>
</div></div>
{% endblock %}
