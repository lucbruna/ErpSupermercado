{% extends "base.html" %}
{% block content %}
<h4 class="mb-3"><i class="bi bi-tags"></i> {{ 'Editar' if cat else 'Nova' }} Categoria</h4>
<div class="card card-dash"><div class="card-body">
<form method="POST">
    <div class="row">
        <div class="col-md-6 mb-3"><label class="form-label">Nome *</label><input type="text" name="nome" class="form-control" value="{{ cat.nome if cat else '' }}" required></div>
        <div class="col-md-6 mb-3"><label class="form-label">Descrição</label><textarea name="descricao" class="form-control" rows="2">{{ cat.descricao if cat else '' }}</textarea></div>
    </div>
    {% if cat %}
    <div class="mb-3 form-check">
        <input type="checkbox" name="ativo" class="form-check-input" id="ativo" {% if cat.ativo %}checked{% endif %}>
        <label class="form-check-label" for="ativo">Ativo</label>
    </div>
    {% endif %}
    <button type="submit" class="btn btn-warning">Salvar</button>
    <a href="{{ url_for('cadastros.lista_categorias') }}" class="btn btn-secondary">Cancelar</a>
</form>
</div></div>
{% endblock %}
