{% extends "base.html" %}
{% block title %}Emitir NF-e{% endblock %}
{% block content %}
<h2><i class="bi bi-plus-circle"></i> Emitir NF-e</h2>
<hr>
<form method="POST">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="row">
        <div class="col-md-6 mb-3">
            <label class="form-label">Venda (opcional)</label>
            <select name="venda_id" class="form-select">
                <option value="">Selecione uma venda</option>
                {% for v in vendas %}
                <option value="{{ v.id }}">#{{ v.id }} - {{ v.cliente.nome if v.cliente else 'Consumidor' }} - R$ {{ "%.2f"|format(v.total|float) }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="col-md-6 mb-3">
            <label class="form-label">Cliente *</label>
            <select name="cliente_id" class="form-select" required>
                <option value="">Selecione</option>
                {% for c in clientes %}
                <option value="{{ c.id }}">{{ c.nome }} - {{ c.cpf_cnpj }}</option>
                {% endfor %}
            </select>
        </div>
    </div>
    <div class="row">
        <div class="col-md-4 mb-3">
            <label class="form-label">CFOP</label>
            <select name="cfop" class="form-select">
                <option value="5102">5102 - Venda Merc. Adquirida</option>
                <option value="5405">5405 - Venda Contribuinte</option>
                <option value="6102">6102 - Venda NF (Interestadual)</option>
                <option value="6108">6108 - Venda Consumidor NF</option>
                <option value="5202">5202 - Devolução</option>
            </select>
        </div>
        <div class="col-md-8 mb-3">
            <label class="form-label">Natureza da Operação</label>
            <input type="text" name="natureza_operacao" class="form-control" value="Venda">
        </div>
    </div>
    <button type="submit" class="btn btn-primary"><i class="bi bi-send"></i> Emitir NF-e</button>
    <a href="{{ url_for('nfe.dashboard') }}" class="btn btn-secondary">Cancelar</a>
</form>
{% endblock %}
