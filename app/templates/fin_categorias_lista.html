{% extends "base.html" %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h4 class="mb-0"><i class="bi bi-tags"></i> Categorias Financeiras</h4>
    <a href="{{ url_for('financeiro.nova_categoria') }}" class="btn btn-primary"><i class="bi bi-plus-lg"></i> Nova</a>
</div>
<div class="card card-dash"><div class="card-body p-0">
    <table class="table table-hover mb-0">
        <thead class="table-light"><tr><th>Nome</th><th>Tipo</th><th>Ativo</th><th></th></tr></thead>
        <tbody>
            {% for c in categorias %}
            <tr>
                <td>{{ c.nome }}</td>
                <td>{% if c.tipo == 'R' %}<span class="badge bg-success">Receita</span>{% else %}<span class="badge bg-danger">Despesa</span>{% endif %}</td>
                <td>{% if c.ativo %}<span class="badge bg-success">Sim</span>{% else %}<span class="badge bg-danger">Nao</span>{% endif %}</td>
                <td><a href="{{ url_for('financeiro.editar_categoria', id=c.id) }}" class="btn btn-sm btn-outline-warning"><i class="bi bi-pencil"></i></a></td>
            </tr>
            {% else %}
            <tr><td colspan="4" class="text-center text-muted py-4">Nenhuma categoria</td></tr>
            {% endfor %}
        </tbody>
    </table>
</div></div>
{% endblock %}
