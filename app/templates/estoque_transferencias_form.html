{% extends "base.html" %}
{% block title %}Nova Transferência{% endblock %}
{% block content %}
<h2><i class="bi bi-arrows-left-right"></i> Nova Transferência de Estoque</h2>
<hr>
<form method="POST">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="row mb-3">
        <div class="col-md-4">
            <label class="form-label">Origem</label>
            <select name="filial_origem_id" class="form-select" required>
                <option value="">-- Selecione --</option>
                {% for f in filiais %}
                <option value="{{ f.id }}">{{ f.nome }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="col-md-4">
            <label class="form-label">Destino</label>
            <select name="filial_destino_id" class="form-select" required>
                <option value="">-- Selecione --</option>
                {% for f in filiais %}
                <option value="{{ f.id }}">{{ f.nome }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="col-md-4">
            <label class="form-label">Data</label>
            <input type="date" name="data_transferencia" class="form-control" value="{{ hoje.strftime('%Y-%m-%d') }}">
        </div>
    </div>
    <div class="mb-3">
        <label class="form-label">Observação</label>
        <input type="text" name="observacao" class="form-control" placeholder="Motivo da transferência...">
    </div>

    <h5><i class="bi bi-box"></i> Itens</h5>
    <table class="table table-sm" id="tblItens">
        <thead><tr><th>Produto</th><th>Quantidade</th><th></th></tr></thead>
        <tbody>
            <tr>
                <td>
                    <select name="produto_id" class="form-select form-select-sm" required>
                        <option value="">--</option>
                        {% for p in produtos %}
                        <option value="{{ p.id }}">{{ p.nome }} (estoque: {{ p.estoque_atual }})</option>
                        {% endfor %}
                    </select>
                </td>
                <td><input type="number" name="quantidade" class="form-control form-control-sm" step="0.001" min="0.001" value="1" required></td>
                <td><button type="button" class="btn btn-sm btn-outline-danger" onclick="this.closest('tr').remove()"><i class="bi bi-trash"></i></button></td>
            </tr>
        </tbody>
    </table>
    <button type="button" class="btn btn-sm btn-outline-success mb-3" onclick="addLinha()"><i class="bi bi-plus-lg"></i> Item</button>
    <br>
    <button type="submit" class="btn btn-primary"><i class="bi bi-save"></i> Criar Transferência</button>
    <a href="{{ url_for('transferencias.lista') }}" class="btn btn-secondary">Cancelar</a>
</form>
{% endblock %}
{% block scripts %}
<script>
var produtos = [
    {% for p in produtos %}{ id: {{ p.id }}, nome: '{{ p.nome|e }}', estoque: {{ p.estoque_atual }} }{% if not loop.last %},{% endif %}{% endfor %}
];
function addLinha() {
    var tbody = document.querySelector('#tblItens tbody');
    var tr = document.createElement('tr');
    var sel = '<select name="produto_id" class="form-select form-select-sm" required><option value="">--</option>';
    produtos.forEach(function(p) { sel += '<option value="' + p.id + '">' + p.nome + ' (estoque: ' + p.estoque + ')</option>'; });
    sel += '</select>';
    tr.innerHTML = '<td>' + sel + '</td><td><input type="number" name="quantidade" class="form-control form-control-sm" step="0.001" min="0.001" value="1" required></td><td><button type="button" class="btn btn-sm btn-outline-danger" onclick="this.closest(\'tr\').remove()"><i class="bi bi-trash"></i></button></td>';
    tbody.appendChild(tr);
}
</script>
{% endblock %}
