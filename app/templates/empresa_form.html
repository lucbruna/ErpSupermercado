{% extends "base.html" %}
{% block content %}
<h4 class="mb-3"><i class="bi bi-building"></i> {{ 'Editar' if empresa else 'Nova' }} Empresa</h4>
<div class="card card-dash"><div class="card-body">
<form method="POST">
    <div class="row">
        <div class="col-md-6 mb-3"><label class="form-label">Razão Social *</label><input type="text" name="razao_social" class="form-control" value="{{ empresa.razao_social if empresa else '' }}" required></div>
        <div class="col-md-3 mb-3"><label class="form-label">Nome Fantasia</label><input type="text" name="nome_fantasia" class="form-control" value="{{ empresa.nome_fantasia if empresa else '' }}"></div>
        <div class="col-md-3 mb-3"><label class="form-label">CNPJ *</label><input type="text" name="cnpj" class="form-control" value="{{ empresa.cnpj if empresa else '' }}" required></div>
    </div>
    <div class="row">
        <div class="col-md-3 mb-3"><label class="form-label">Insc. Estadual</label><input type="text" name="ie" class="form-control" value="{{ empresa.ie if empresa else '' }}"></div>
        <div class="col-md-3 mb-3"><label class="form-label">Insc. Municipal</label><input type="text" name="im" class="form-control" value="{{ empresa.im if empresa else '' }}"></div>
        <div class="col-md-3 mb-3"><label class="form-label">Regime Tributário</label>
            <select name="regime_tributario" class="form-select">
                <option value="1" {% if empresa and empresa.regime_tributario == '1' %}selected{% endif %}>Simples Nacional</option>
                <option value="2" {% if empresa and empresa.regime_tributario == '2' %}selected{% endif %}>Lucro Presumido</option>
                <option value="3" {% if empresa and empresa.regime_tributario == '3' %}selected{% endif %}>Lucro Real</option>
            </select>
        </div>
        <div class="col-md-3 mb-3"><label class="form-label">Telefone</label><input type="text" name="telefone" class="form-control" value="{{ empresa.telefone if empresa else '' }}"></div>
    </div>
    <div class="row">
        <div class="col-md-2 mb-3"><label class="form-label">CEP</label><input type="text" name="cep" class="form-control" value="{{ empresa.cep if empresa else '' }}"></div>
        <div class="col-md-5 mb-3"><label class="form-label">Endereço</label><input type="text" name="endereco" class="form-control" value="{{ empresa.endereco if empresa else '' }}"></div>
        <div class="col-md-1 mb-3"><label class="form-label">Nº</label><input type="text" name="numero" class="form-control" value="{{ empresa.numero if empresa else '' }}"></div>
        <div class="col-md-4 mb-3"><label class="form-label">Bairro</label><input type="text" name="bairro" class="form-control" value="{{ empresa.bairro if empresa else '' }}"></div>
    </div>
    <div class="row">
        <div class="col-md-4 mb-3"><label class="form-label">Cidade</label><input type="text" name="cidade" class="form-control" value="{{ empresa.cidade if empresa else '' }}"></div>
        <div class="col-md-2 mb-3"><label class="form-label">UF</label><input type="text" name="uf" class="form-control" maxlength="2" value="{{ empresa.uf if empresa else '' }}"></div>
        <div class="col-md-3 mb-3"><label class="form-label">Email</label><input type="email" name="email" class="form-control" value="{{ empresa.email if empresa else '' }}"></div>
    </div>
    <button type="submit" class="btn btn-warning">Salvar</button>
    <a href="{{ url_for('cadastros.lista_empresas') }}" class="btn btn-secondary">Cancelar</a>
</form>
</div></div>
{% endblock %}
