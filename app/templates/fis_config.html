{% extends "base.html" %}
{% block content %}
<h4 class="mb-3"><i class="bi bi-gear"></i> Configuracao Fiscal</h4>
<div class="card card-dash"><div class="card-body">
<form method="POST">
    <h6>Empresa</h6>
    <p>{{ empresa.razao_social if empresa else 'Nenhuma empresa cadastrada' }} | CNPJ: {{ empresa.cnpj if empresa else '-' }}</p>
    <hr>
    <h6>Regime Tributario</h6>
    <div class="row">
        <div class="col-md-4 mb-3"><label class="form-label">Regime</label>
            <select name="regime_tributario" class="form-select">
                <option value="1" {{ 'selected' if cfg.regime_tributario=='1' }}>Simples Nacional</option>
                <option value="2" {{ 'selected' if cfg.regime_tributario=='2' }}>Lucro Presumido</option>
                <option value="3" {{ 'selected' if cfg.regime_tributario=='3' }}>Lucro Real</option>
            </select>
        </div>
        <div class="col-md-4 mb-3"><label class="form-label">Aliquota Padrao ICMS (%)</label><input type="number" name="aliquota_padrao" class="form-control" step="0.01" value="{{ cfg.aliquota_padrao or 18 }}"></div>
        <div class="col-md-4 mb-3"><label class="form-label">Ambiente</label>
            <select name="ambiente" class="form-select">
                <option value="2" {{ 'selected' if cfg.ambiente=='2' }}>Homologacao (Teste)</option>
                <option value="1" {{ 'selected' if cfg.ambiente=='1' }}>Producao</option>
            </select>
        </div>
    </div>
    <h6 class="mt-3">Numeracao</h6>
    <div class="row">
        <div class="col-md-3 mb-3"><label class="form-label">Serie NFC-e</label><input type="number" name="serie_nfce" class="form-control" value="{{ cfg.serie_nfce or 1 }}"></div>
        <div class="col-md-3 mb-3"><label class="form-label">Serie NF-e</label><input type="number" name="serie_nfe" class="form-control" value="{{ cfg.serie_nfe or 1 }}"></div>
    </div>
    <h6 class="mt-3">Certificado Digital A1</h6>
    <div class="row">
        <div class="col-md-6 mb-3"><label class="form-label">Arquivo (caminho)</label><input type="text" name="certificado_digital" class="form-control" value="{{ cfg.certificado_digital or '' }}" placeholder="C:\certificados\cert.pfx"></div>
        <div class="col-md-3 mb-3"><label class="form-label">Senha</label><input type="password" name="certificado_senha" class="form-control" value="{{ cfg.certificado_senha or '' }}"></div>
    </div>
    <button type="submit" class="btn btn-primary">Salvar</button>
    <a href="{{ url_for('fiscal.dashboard') }}" class="btn btn-secondary">Voltar</a>
</form>
</div></div>
{% endblock %}
