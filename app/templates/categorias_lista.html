{% extends "base.html" %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h4 class="mb-0"><i class="bi bi-tags"></i> Categorias</h4>
    <a href="{{ url_for('cadastros.nova_categoria') }}" class="btn btn-warning"><i class="bi bi-plus-lg"></i> Nova</a>
</div>
<div class="card card-dash">
    <div class="card-body p-0">
        <table class="table table-hover mb-0">
            <thead class="table-light">
                <tr><th>Nome</th><th>Descrição</th><th>Ativo</th><th>Ações</th></tr>
            </thead>
            <tbody>
                {% for c in categorias %}
                <tr>
                    <td>{{ c.nome }}</td>
                    <td>{{ c.descricao or '-' }}</td>
                    <td>{% if c.ativo %}<span class="badge bg-success">Sim</span>{% else %}<span class="badge bg-secondary">Não</span>{% endif %}</td>
                    <td>
                        <a href="{{ url_for('cadastros.editar_categoria', id=c.id) }}" class="btn btn-sm btn-outline-primary"><i class="bi bi-pencil"></i></a>
                    </td>
                </tr>
                {% else %}
                <tr><td colspan="4" class="text-center text-muted py-4">Nenhuma categoria cadastrada</td></tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
