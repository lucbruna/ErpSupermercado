{% extends "base.html" %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h4 class="mb-0"><i class="bi bi-briefcase"></i> Cargos</h4>
    <a href="{{ url_for('rh.novo_cargo') }}" class="btn btn-primary"><i class="bi bi-plus-lg"></i> Novo</a>
</div>
<div class="card card-dash"><div class="card-body p-0">
    <table class="table table-hover mb-0">
        <thead class="table-light">
            <tr><th>Nome</th><th>Salario Base</th><th>Ativo</th><th></th></tr>
        </thead>
        <tbody>
            {% for c in cargos %}
            <tr>
                <td>{{ c.nome }}</td>
                <td>R$ {{ "%.2f"|format(c.salario_base|float) }}</td>
                <td>{% if c.ativo %}<span class="badge bg-success">Sim</span>{% else %}<span class="badge bg-danger">Nao</span>{% endif %}</td>
                <td><a href="{{ url_for('rh.editar_cargo', id=c.id) }}" class="btn btn-sm btn-outline-warning"><i class="bi bi-pencil"></i></a></td>
            </tr>
            {% else %}
            <tr><td colspan="4" class="text-center text-muted py-4">Nenhum cargo cadastrado</td></tr>
            {% endfor %}
        </tbody>
    </table>
</div></div>
{% endblock %}
