{% extends "base.html" %}
{% block title %}NF-e Devolução{% endblock %}
{% block content %}
<h2><i class="bi bi-arrow-return-left"></i> NF-e Devolução</h2>
<hr>
<form method="POST">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="row">
        <div class="col-md-6 mb-3">
            <label class="form-label">Venda Original *</label>
            <select name="venda_id" class="form-select" required>
                <option value="">Selecione</option>
                {% for v in vendas %}
                <option value="{{ v.id }}">#{{ v.id }} - {{ v.cliente.nome if v.cliente else 'Consumidor' }} - R$ {{ "%.2f"|format(v.total|float) }} - {{ v.created_at.strftime('%d/%m/%Y') }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="col-md-6 mb-3">
            <label class="form-label">CFOP Devolução</label>
            <select name="cfop" class="form-select">
                <option value="5202">5202 - Devolução Venda (mesmo estado)</option>
                <option value="6202">6202 - Devolução Venda (outro estado)</option>
                <option value="1201">1201 - Devolução Compra</option>
                <option value="2201">2201 - Devolução Compra (outro estado)</option>
            </select>
        </div>
    </div>
    <div class="mb-3">
        <label class="form-label">Justificativa</label>
        <textarea name="justificativa" class="form-control" rows="2">Devolução de mercadoria</textarea>
    </div>
    <button type="submit" class="btn btn-warning"><i class="bi bi-arrow-return-left"></i> Emitir NF-e Devolução</button>
    <a href="{{ url_for('nfe.dashboard') }}" class="btn btn-secondary">Cancelar</a>
</form>
{% endblock %}
