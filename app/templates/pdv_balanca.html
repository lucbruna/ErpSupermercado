{% extends "base.html" %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h4 class="mb-0"><i class="bi bi-weights"></i> Configuração da Balança</h4>
</div>
<div class="row">
    <div class="col-md-6">
        <div class="card card-dash p-4">
            <form method="POST">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div class="mb-3">
                    <label class="form-label">Modelo</label>
                    <select name="modelo" class="form-select" id="modelo">
                        <option value="toledo" {% if cfg.modelo == 'toledo' %}selected{% endif %}>Toledo (Protocolo 858)</option>
                        <option value="filizola" {% if cfg.modelo == 'filizola' %}selected{% endif %}>Filizola (Contínuo)</option>
                        <option value="lider" {% if cfg.modelo == 'lider' %}selected{% endif %}>Líder (RS-232)</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label">Porta COM</label>
                    <select name="porta" class="form-select" id="porta">
                        {% for p in portas %}
                        <option value="{{ p.dispositivo }}" {% if cfg.porta == p.dispositivo %}selected{% endif %}>{{ p.dispositivo }} - {{ p.descricao }}</option>
                        {% endfor %}
                        <option value="COM1" {% if cfg.porta == 'COM1' and not portas %}selected{% endif %}>COM1</option>
                        <option value="COM2" {% if cfg.porta == 'COM2' %}selected{% endif %}>COM2</option>
                        <option value="COM3" {% if cfg.porta == 'COM3' %}selected{% endif %}>COM3</option>
                        <option value="COM4" {% if cfg.porta == 'COM4' %}selected{% endif %}>COM4</option>
                        <option value="/dev/ttyUSB0" {% if cfg.porta == '/dev/ttyUSB0' %}selected{% endif %}>/dev/ttyUSB0 (Linux)</option>
                    </select>
                    <small class="text-muted" id="portas-info"></small>
                </div>
                <div class="row">
                    <div class="col-md-4 mb-3">
                        <label class="form-label">Baud Rate</label>
                        <select name="baudrate" class="form-select">
                            {% for b in [1200, 2400, 4800, 9600, 19200, 38400, 57600, 115200] %}
                            <option value="{{ b }}" {% if cfg.baudrate == b %}selected{% endif %}>{{ b }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-md-2 mb-3">
                        <label class="form-label">Data Bits</label>
                        <select name="bytesize" class="form-select">
                            {% for b in [5, 6, 7, 8] %}
                            <option value="{{ b }}" {% if cfg.bytesize == b %}selected{% endif %}>{{ b }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-md-3 mb-3">
                        <label class="form-label">Paridade</label>
                        <select name="parity" class="form-select">
                            <option value="N" {% if cfg.parity == 'N' %}selected{% endif %}>Nenhuma</option>
                            <option value="E" {% if cfg.parity == 'E' %}selected{% endif %}>Par</option>
                            <option value="O" {% if cfg.parity == 'O' %}selected{% endif %}>Ímpar</option>
                        </select>
                    </div>
                    <div class="col-md-3 mb-3">
                        <label class="form-label">Stop Bits</label>
                        <select name="stopbits" class="form-select">
                            <option value="1" {% if cfg.stopbits == 1 %}selected{% endif %}>1</option>
                            <option value="2" {% if cfg.stopbits == 2 %}selected{% endif %}>2</option>
                        </select>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label">Timeout (segundos)</label>
                    <input type="number" name="timeout" class="form-control" value="{{ cfg.timeout or 5 }}" min="1" max="30">
                </div>
                <div class="mb-3">
                    <div class="form-check">
                        <input type="checkbox" name="ativo" class="form-check-input" id="ativo" {% if cfg.ativo %}checked{% endif %}>
                        <label class="form-check-label" for="ativo">Balança ativa</label>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg"></i> Salvar</button>
                <button type="button" class="btn btn-info" id="btnTestar"><i class="bi bi-activity"></i> Testar Conexão</button>
                <button type="button" class="btn btn-success" id="btnLerPeso"><i class="bi bi-arrow-down"></i> Ler Peso</button>
            </form>
        </div>
    </div>
    <div class="col-md-6">
        <div class="card card-dash p-4">
            <h5>Resultado do Teste</h5>
            <div id="resultadoTeste" class="mt-3">
                <p class="text-muted">Clique em "Testar Conexão" ou "Ler Peso"</p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script>
document.getElementById('btnTestar')?.addEventListener('click', async function() {
    const div = document.getElementById('resultadoTeste');
    div.innerHTML = '<div class="spinner-border text-info"></div> Testando...';
    const form = this.closest('form');
    const fd = new FormData(form);
    try {
        const r = await fetch('{{ url_for("pdv.balanca_testar") }}', { method: 'POST', body: fd });
        const d = await r.json();
        if (d.sucesso) {
            div.innerHTML = `<div class="alert alert-success mb-0"><strong>Peso lido:</strong> ${d.peso} kg</div>`;
        } else {
            div.innerHTML = `<div class="alert alert-danger mb-0"><strong>Erro:</strong> ${d.erro}</div>`;
        }
    } catch(e) {
        div.innerHTML = `<div class="alert alert-danger mb-0">Erro: ${e.message}</div>`;
    }
});
document.getElementById('btnLerPeso')?.addEventListener('click', async function() {
    const div = document.getElementById('resultadoTeste');
    div.innerHTML = '<div class="spinner-border text-success"></div> Lendo peso...';
    try {
        const r = await fetch('{{ url_for("pdv.balanca_ler_peso") }}');
        const d = await r.json();
        if (d.sucesso) {
            div.innerHTML = `<div class="alert alert-success mb-0"><strong>Peso:</strong> ${d.peso} kg</div>`;
        } else {
            div.innerHTML = `<div class="alert alert-danger mb-0"><strong>Erro:</strong> ${d.erro}</div>`;
        }
    } catch(e) {
        div.innerHTML = `<div class="alert alert-danger mb-0">Erro: ${e.message}</div>`;
    }
});
</script>
{% endblock %}
