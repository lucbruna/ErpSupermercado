{% extends "base.html" %}
{% block title %}Login Facial{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header bg-dark text-white text-center"><h4><i class="bi bi-camera"></i> Login Facial</h4></div>
            <div class="card-body text-center">
                <video id="video" width="480" height="360" autoplay style="border:1px solid #ccc;border-radius:5px;"></video>
                <div class="mt-3">
                    <button id="btnVerificar" class="btn btn-primary"><i class="bi bi-camera"></i> Verificar Rosto</button>
                    <a href="{{ url_for('auth.login') }}" class="btn btn-secondary">Login Padrão</a>
                </div>
                <div id="resultado" class="mt-3"></div>
            </div>
        </div>
    </div>
</div>

<form id="formLogin" method="POST" action="{{ url_for('biometria.verificar') }}" style="display:none;">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <input type="hidden" name="imagem" id="inputImagem">
</form>
{% endblock %}
{% block scripts %}
<script>
var video = document.getElementById('video');
var canvas = document.createElement('canvas');
canvas.width = 480; canvas.height = 360;
var ctx = canvas.getContext('2d');
var stream = null;

navigator.mediaDevices.getUserMedia({video: {width:480,height:360,facingMode:'user'}})
.then(function(s) {
    stream = s;
    video.srcObject = s;
}).catch(function(e) {
    document.getElementById('resultado').innerHTML = '<div class="alert alert-danger">Erro camera: ' + e.message + '</div>';
});

document.getElementById('btnVerificar').onclick = function() {
    ctx.drawImage(video, 0, 0, 480, 360);
    var dataUrl = canvas.toDataURL('image/jpeg');
    if (stream) { stream.getTracks().forEach(function(t) { t.stop(); }); }

    var btn = document.getElementById('btnVerificar');
    btn.disabled = true;
    btn.innerHTML = 'Verificando...';
    document.getElementById('resultado').innerHTML = '<div class="alert alert-info">Processando...</div>';

    fetch('{{ url_for("biometria.verificar") }}', {
        method: 'POST',
        headers: {'Content-Type': 'application/x-www-form-urlencoded'},
        body: 'csrf_token={{ csrf_token() }}&imagem=' + encodeURIComponent(dataUrl)
    })
    .then(function(r) { return r.json(); })
    .then(function(d) {
        if (d.ok) {
            document.getElementById('resultado').innerHTML = '<div class="alert alert-success">Bem-vindo, ' + d.nome + '! Redirecionando...</div>';
            window.location.href = '{{ url_for("cadastros.dashboard") }}';
        } else {
            document.getElementById('resultado').innerHTML = '<div class="alert alert-danger">' + (d.erro || 'Nao reconhecido') + '</div>';
            btn.disabled = false;
            btn.innerHTML = '<i class="bi bi-camera"></i> Tentar Novamente';
            navigator.mediaDevices.getUserMedia({video: {width:480,height:360,facingMode:'user'}})
            .then(function(s) { stream = s; video.srcObject = s; });
        }
    })
    .catch(function(e) {
        document.getElementById('resultado').innerHTML = '<div class="alert alert-danger">Erro: ' + e.message + '</div>';
        btn.disabled = false;
        btn.innerHTML = '<i class="bi bi-camera"></i> Tentar Novamente';
    });
};

window.onbeforeunload = function() {
    if (stream) { stream.getTracks().forEach(function(t) { t.stop(); }); }
};
</script>
{% endblock %}
